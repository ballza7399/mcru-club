      # สำหรับ Production: ควรปิดการเมาท์โค้ดทั้งหมด (บรรทัดบน) และเปิดเฉพาะโฟลเดอร์เก็บรูปภาพ uploads
      # - ./uploads:/var/www/html/uploads

    restart: unless-stopped

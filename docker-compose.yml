services:
  app:
    build: .
    image: ghcr.io/min-kittisak/mcru-club:latest
    container_name: mcru-club-app
    ports:
      - "7399:80"
    environment:
      DB_HOST: 157.85.96.163
      DB_USER: cs
      DB_PASS: cEBzc3cwcmQ=
      DB_NAME: mcru-club
      APP_BASE_PATH: ""
      # debug=true แสดง developer exception page เต็ม (path/stack trace/DB error)
      # ⚠️ ต้องเป็น false หรือเอาออกบน production เพราะหลุดข้อมูล internal
      APP_DEBUG: "true"
    volumes:
